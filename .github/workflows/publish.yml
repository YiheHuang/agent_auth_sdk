name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Verify release tag and synchronized package versions
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          sdk = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          registry = tomllib.loads(
              pathlib.Path("packages/agent-auth-registry/pyproject.toml").read_text()
          )["project"]["version"]
          tag = os.environ["RELEASE_TAG"]
          if sdk != registry or tag != f"v{sdk}":
              raise SystemExit(f"release mismatch: tag={tag}, sdk={sdk}, registry={registry}")
          PY
      - run: python -m pip install --upgrade build twine
      - run: python -m build --sdist --wheel
      - run: python -m build --sdist --wheel packages/agent-auth-registry
      - run: python -m twine check --strict dist/* packages/agent-auth-registry/dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-distributions
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: registry-distributions
          path: packages/agent-auth-registry/dist/

  publish-sdk:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/verifiable-agent-auth-sdk/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-registry:
    needs: [build, publish-sdk]
    runs-on: ubuntu-latest
    environment:
      name: pypi-registry
      url: https://pypi.org/project/verifiable-agent-auth-registry/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: registry-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
