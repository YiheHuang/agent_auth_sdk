[build-system]
requires = ["hatchling>=1.26.0"]
build-backend = "hatchling.build"

[project]
name = "agent-identity-sdk"
version = "0.2.0"
description = "Python Agent Identity SDK and LLM Gateway"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "OpenAI Codex" }
]
dependencies = [
  "cryptography>=43.0.0",
  "fastapi>=0.115.0",
  "httpx>=0.27.0",
  "pydantic>=2.8.0",
  "redis>=5.0.0",
  "typer>=0.12.0",
  "uvicorn>=0.30.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-asyncio>=0.23.0"
]

[project.scripts]
agent-id = "agent_identity_sdk.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["agent_identity_sdk", "examples"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]
testpaths = ["pytests"]

