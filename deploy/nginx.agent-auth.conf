server {
    listen 80;
    server_name 192.144.228.237;

    client_max_body_size 2m;

    location = /healthz {
        proxy_pass http://127.0.0.1:8008/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /.well-known/agent.json {
        proxy_pass http://127.0.0.1:8008/.well-known/agent.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /registry/agents/publish {
        proxy_pass http://127.0.0.1:8008/registry/agents/publish;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location = /registry/agents/rotate-key {
        proxy_pass http://127.0.0.1:8008/registry/agents/rotate-key;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }
}
