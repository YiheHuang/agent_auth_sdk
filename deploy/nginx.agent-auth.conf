# Replace the host and certificate paths before enabling.
limit_req_zone $binary_remote_addr zone=agent_auth_write:10m rate=5r/s;

server {
    listen 80;
    server_name registry.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name registry.example.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/registry.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registry.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 256k;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location ~ ^/(health/(live|ready)|\.well-known/agent\.json)$ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $http_host;
    }

    location = /v1/agents/resolve {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $http_host;
    }

    location = /v1/agents {
        limit_req zone=agent_auth_write burst=10 nodelay;
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $http_host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Registry-Client-ID $http_x_registry_client_id;
    }

    location / { return 404; }
}
