name: Publish to TestPyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact SDK and Registry version to verify
        required: true
        default: 1.0.0
      upload_packages:
        description: Build and upload packages before verification
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    if: ${{ inputs.upload_packages }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Verify requested and synchronized package versions
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          sdk = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          registry = tomllib.loads(
              pathlib.Path("packages/agent-auth-registry/pyproject.toml").read_text()
          )["project"]["version"]
          requested = os.environ["REQUESTED_VERSION"]
          if sdk != registry or requested != sdk:
              raise SystemExit(f"release mismatch: requested={requested}, sdk={sdk}, registry={registry}")
          PY
      - run: python -m pip install --upgrade build twine
      - run: python -m build --sdist --wheel
      - run: python -m build --sdist --wheel packages/agent-auth-registry
      - run: python -m twine check --strict dist/* packages/agent-auth-registry/dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: testpypi-sdk-distributions
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: testpypi-registry-distributions
          path: packages/agent-auth-registry/dist/

  publish-sdk-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/verifiable-agent-auth-sdk/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: testpypi-sdk-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-registry-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi-registry
      url: https://test.pypi.org/project/verifiable-agent-auth-registry/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: testpypi-registry-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  clean-install:
    needs: [publish-sdk-testpypi, publish-registry-testpypi]
    if: "${{ always() && (!inputs.upload_packages || (needs.publish-sdk-testpypi.result == 'success' && needs.publish-registry-testpypi.result == 'success')) }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install --upgrade pip
      - name: Download exact wheels from TestPyPI without third-party dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5 6; do
            rm -rf testpypi-dist
            mkdir -p testpypi-dist
            if python -m pip download \
              --no-deps \
              --only-binary=:all: \
              --index-url https://test.pypi.org/simple/ \
              --dest testpypi-dist \
              "verifiable-agent-auth-sdk==${{ inputs.version }}" \
              "verifiable-agent-auth-registry==${{ inputs.version }}"; then
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              echo "TestPyPI index has not propagated yet; retrying in 10 seconds."
              sleep 10
            fi
          done
          exit 1
      - name: Install downloaded wheels with dependencies from PyPI
        run: python -m pip install testpypi-dist/*.whl
      - run: agent-auth --help
      - run: agent-auth-registry --help
      - run: agent-auth-registry-admin --help
