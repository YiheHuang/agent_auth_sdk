[build-system]
requires = ["hatchling>=1.26.0"]
build-backend = "hatchling.build"

[project]
name = "verifiable-agent-auth-registry"
version = "0.1.0b1"
description = "Hardened single-node registry service for Agent Auth identities"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Yihe Huang" }]
keywords = ["agent", "authentication", "identity", "registry"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Security :: Cryptography",
]
dependencies = [
  "verifiable-agent-auth-sdk==0.1.0b1",
  "fastapi>=0.115.0",
  "uvicorn>=0.30.0",
  "typer>=0.12.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.3.0"]

[project.urls]
Homepage = "https://github.com/YiheHuang/agent_auth_sdk"
Source = "https://github.com/YiheHuang/agent_auth_sdk"
Issues = "https://github.com/YiheHuang/agent_auth_sdk/issues"

[project.scripts]
agent-auth-registry = "agent_auth_registry.run:main"
agent-auth-registry-admin = "agent_auth_registry.admin:app"

[tool.hatch.build]
ignore-vcs = true

[tool.hatch.build.targets.wheel]
packages = ["src/agent_auth_registry"]

[tool.hatch.build.targets.sdist]
include = ["/src/agent_auth_registry", "/README.md", "/LICENSE", "/pyproject.toml"]
exclude = ["/.gitignore", ".gitignore", "/.pkg-audit", "/dist"]
